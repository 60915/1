<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>元素之心（修正版）</title>
<style>
body { margin:0; overflow:hidden; font-family:sans-serif; }

#panel {
 position:fixed;
 top:10px;
 left:10px;
 background:rgba(0,0,0,0.6);
 color:white;
 padding:10px;
 border-radius:10px;
}

#ui {
 position:fixed;
 right:20px;
 bottom:20px;
}

button {
 width:70px;
 height:70px;
 margin:5px;
 font-size:20px;
}

#joystick {
 position:fixed;
 left:20px;
 bottom:20px;
 width:120px;
 height:120px;
 background:rgba(255,255,255,0.2);
 border-radius:50%;
}

#stick {
 width:50px;
 height:50px;
 background:white;
 border-radius:50%;
 position:absolute;
 left:35px;
 top:35px;
}
</style>
</head>
<body>

<div id="panel">
HP: <span id="hp">100</span><br>
金幣: <span id="gold">0</span><br>
等級: <span id="level">1</span>
</div>

<div id="ui">
<button onclick="attack()">⚔️</button>
<button onclick="openShop()">💎</button>
</div>

<div id="joystick">
<div id="stick"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
// ===== 場景 =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// 光
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,5);
scene.add(light);

// 地面
const ground = new THREE.Mesh(
 new THREE.PlaneGeometry(100,100),
 new THREE.MeshStandardMaterial({color:0x228B22})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// 玩家
const player = new THREE.Mesh(
 new THREE.BoxGeometry(1,1,1),
 new THREE.MeshStandardMaterial({color:0x0000ff})
);
player.position.y = 0.5;
scene.add(player);

// 敵人
let enemy = new THREE.Mesh(
 new THREE.BoxGeometry(1,1,1),
 new THREE.MeshStandardMaterial({color:0xff0000})
);
enemy.position.set(5,0.5,5);
scene.add(enemy);

let enemyHP = 50;

// ===== 玩家數值 =====
let hp = 100;
let gold = 0;
let level = 1;
let atk = 10;

// ===== 搖桿控制 =====
let joystick = {x:0, y:0};
let dragging = false;

const stick = document.getElementById("stick");
const joystickDiv = document.getElementById("joystick");

joystickDiv.addEventListener("touchstart", ()=> dragging=true);
joystickDiv.addEventListener("touchend", ()=>{
 dragging=false;
 joystick.x = 0;
 joystick.y = 0;
 stick.style.left="35px";
 stick.style.top="35px";
});

joystickDiv.addEventListener("touchmove", e=>{
 let rect = joystickDiv.getBoundingClientRect();
 let x = e.touches[0].clientX - rect.left - 60;
 let y = e.touches[0].clientY - rect.top - 60;

 let dist = Math.sqrt(x*x+y*y);
 if(dist>40){
   x*=40/dist;
   y*=40/dist;
 }

 joystick.x = x/40;
 joystick.y = y/40;

 stick.style.left = (x+60-25)+"px";
 stick.style.top = (y+60-25)+"px";
});

// ===== 移動 =====
function move(){
 player.position.x += joystick.x * 0.2;
 player.position.z += joystick.y * 0.2;
}

// ===== 攝影機 =====
function cam(){
 camera.position.set(player.position.x,5,player.position.z+6);
 camera.lookAt(player.position);
}

// ===== 攻擊 =====
function attack(){
 if(!enemy) return;

 let dist = player.position.distanceTo(enemy.position);
 if(dist < 2){
   enemyHP -= atk;

   if(enemyHP <= 0){
     gold += 20;
     level++;
     scene.remove(enemy);
     enemy = null;
   }
 }
}

// ===== 商店 =====
function openShop(){
 if(gold >= 50){
   gold -= 50;
   atk += 5;
   alert("攻擊升級！");
 }else{
   alert("金幣不夠！");
 }
}

// ===== AI =====
function enemyAI(){
 if(!enemy) return;

 let dir = player.position.clone().sub(enemy.position).normalize();
 enemy.position.add(dir.multiplyScalar(0.03));

 let dist = player.position.distanceTo(enemy.position);
 if(dist < 1.5){
   hp -= 0.5;
 }
}

// ===== UI =====
function updateUI(){
 if(hp < 0) hp = 0;

 document.getElementById("hp").innerText = Math.floor(hp);
 document.getElementById("gold").innerText = gold;
 document.getElementById("level").innerText = level;

 if(hp <= 0){
   alert("你死了！");
   location.reload();
 }
}

// ===== Loop =====
function loop(){
 requestAnimationFrame(loop);

 move();
 cam();
 enemyAI();
 updateUI();

 renderer.render(scene, camera);
}
loop();

// 視窗調整
window.addEventListener("resize", ()=>{
 renderer.setSize(innerWidth, innerHeight);
 camera.aspect = innerWidth/innerHeight;
 camera.updateProjectionMatrix();
});
</script>

</body>
</html>
